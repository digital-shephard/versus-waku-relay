name: versus-waku-relay

services:
  nwaku:
    image: ${NWAKU_IMAGE:-wakuorg/nwaku:v0.38.1}
    restart: unless-stopped
    stop_grace_period: 45s
    command:
      - --log-level=INFO
      - --log-format=JSON
      - --agent-string=versus-waku-relay/0.1
      - --nodekey=${VERSUS_WAKU_NODE_KEY:?set VERSUS_WAKU_NODE_KEY}
      - --cluster-id=${VERSUS_WAKU_CLUSTER_ID:-66}
      - --num-shards-in-network=${VERSUS_WAKU_NUM_SHARDS:-8}
      - --shard=0
      - --shard=1
      - --shard=2
      - --shard=3
      - --shard=4
      - --shard=5
      - --shard=6
      - --shard=7
      - --max-msg-size=32KiB
      - --relay=true
      - --filter=true
      - --lightpush=true
      - --store=true
      - --store-message-retention-policy=time:${VERSUS_WAKU_STORE_SECONDS:-21600};capacity:${VERSUS_WAKU_STORE_CAPACITY:-25000};size:${VERSUS_WAKU_STORE_SIZE:-512MB}
      - --store-message-db-url=sqlite:///data/store.sqlite3
      - --store-message-db-migration=true
      - --peer-persistence=true
      - --peer-store-capacity=${VERSUS_WAKU_PEER_STORE_CAPACITY:-1000}
      - --keep-alive=true
      - --max-connections=${VERSUS_WAKU_MAX_CONNECTIONS:-200}
      - --relay-service-ratio=60:40
      - --filter-max-peers-to-serve=${VERSUS_WAKU_FILTER_MAX_PEERS:-250}
      - --filter-max-criteria=${VERSUS_WAKU_FILTER_MAX_CRITERIA:-64}
      - --rate-limit=lightpush:30/1s
      - --rate-limit=store:10/1s
      - --rate-limit=filter:12/1m
      - --discv5-discovery=false
      - --peer-exchange=false
      - --rendezvous=false
      - --staticnode=${VERSUS_WAKU_STATIC_PEER:?set VERSUS_WAKU_STATIC_PEER}
      - --ip-colocation-limit=${VERSUS_WAKU_IP_COLOCATION_LIMIT:-20}
      - --nat=extip:${PUBLIC_IP:?set PUBLIC_IP}
      - --ext-multiaddr=/dns4/${PUBLIC_DOMAIN:?set PUBLIC_DOMAIN}/tcp/443/wss
      - --websocket-support=true
      - --websocket-port=8000
      - --rest=true
      - --rest-address=0.0.0.0
      - --rest-port=8645
      - --rest-admin=false
      - --metrics-server=true
      - --metrics-server-address=0.0.0.0
      - --metrics-server-port=8008
    volumes:
      - ${VERSUS_WAKU_DATA_DIR:-./data}:/data
    ports:
      - 60000:60000/tcp
      - 127.0.0.1:${VERSUS_WAKU_REST_PORT:-18645}:8645/tcp
      - 127.0.0.1:${VERSUS_WAKU_METRICS_PORT:-18008}:8008/tcp
    networks:
      - edge
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: 25m
        max-file: "5"

  caddy:
    image: ${CADDY_IMAGE:-caddy:2.10.0-alpine}
    restart: unless-stopped
    depends_on:
      - nwaku
    environment:
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN:?set PUBLIC_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ${CADDY_DATA_DIR:-./runtime/caddy-data}:/data
      - ${CADDY_CONFIG_DIR:-./runtime/caddy-config}:/config
    ports:
      - 80:80/tcp
      - 443:443/tcp
      - 443:443/udp
    networks:
      - edge
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  versus-node:
    build:
      context: ..
      dockerfile: deploy/node.Dockerfile
    image: ${VERSUS_NODE_IMAGE:-versus-node:0.2.4}
    restart: unless-stopped
    depends_on:
      - nwaku
    user: "1000:1000"
    environment:
      VERSUS_BASE_RPC_URL: ${VERSUS_BASE_RPC_URL:?set VERSUS_BASE_RPC_URL}
      VERSUS_CHAIN_ID: ${VERSUS_CHAIN_ID:?set VERSUS_CHAIN_ID}
      VERSUS_ARENA_ADDRESS: ${VERSUS_ARENA_ADDRESS:?set VERSUS_ARENA_ADDRESS}
      VERSUS_RAIN_ATTESTOR_PRIVATE_KEY: ${VERSUS_RAIN_ATTESTOR_PRIVATE_KEY:?set VERSUS_RAIN_ATTESTOR_PRIVATE_KEY}
      VERSUS_RAIN_START_BLOCK: ${VERSUS_RAIN_START_BLOCK:?set VERSUS_RAIN_START_BLOCK}
      VERSUS_RAIN_POLL_MS: ${VERSUS_RAIN_POLL_MS:-12000}
      VERSUS_RAIN_CONFIRMATIONS: ${VERSUS_RAIN_CONFIRMATIONS:-2}
      VERSUS_RAIN_MAX_BLOCK_SPAN: ${VERSUS_RAIN_MAX_BLOCK_SPAN:-2000}
      VERSUS_RAIN_DISTRIBUTION_MS: ${VERSUS_RAIN_DISTRIBUTION_MS:-5000}
      VERSUS_RPC_DAILY_CREDIT_BUDGET: ${VERSUS_RPC_DAILY_CREDIT_BUDGET:-3000000}
      VERSUS_RPC_CREDITS_PER_SECOND: ${VERSUS_RPC_CREDITS_PER_SECOND:-500}
      VERSUS_HATCH_QUOTE_ENABLED: ${VERSUS_HATCH_QUOTE_ENABLED:-true}
      VERSUS_HATCH_QUOTE_REFRESH_MS: ${VERSUS_HATCH_QUOTE_REFRESH_MS:-60000}
      VERSUS_HATCH_QUOTE_FULL_SCAN_MS: ${VERSUS_HATCH_QUOTE_FULL_SCAN_MS:-600000}
      VERSUS_HATCH_QUOTE_VALID_MS: ${VERSUS_HATCH_QUOTE_VALID_MS:-180000}
      VERSUS_HATCH_QUOTE_STALE_MS: ${VERSUS_HATCH_QUOTE_STALE_MS:-900000}
      VERSUS_HATCH_QUOTE_BUFFER_BPS: ${VERSUS_HATCH_QUOTE_BUFFER_BPS:-300}
      VERSUS_CLASS_STATE_REFRESH_MS: ${VERSUS_CLASS_STATE_REFRESH_MS:-60000}
      VERSUS_CLASS_STATE_VALID_MS: ${VERSUS_CLASS_STATE_VALID_MS:-180000}
      VERSUS_CLASS_STATE_STALE_MS: ${VERSUS_CLASS_STATE_STALE_MS:-900000}
      VERSUS_GRADUATION_ENABLED: ${VERSUS_GRADUATION_ENABLED:-false}
      VERSUS_GRADUATION_KEEPER_PRIVATE_KEY: ${VERSUS_GRADUATION_KEEPER_PRIVATE_KEY:-}
      VERSUS_GRADUATION_SUBMISSION_DELAY_MS: ${VERSUS_GRADUATION_SUBMISSION_DELAY_MS:-0}
      VERSUS_GRADUATION_REBROADCAST_MS: ${VERSUS_GRADUATION_REBROADCAST_MS:-120000}
      VERSUS_GRADUATION_MAX_GAS_LIMIT: ${VERSUS_GRADUATION_MAX_GAS_LIMIT:-8000000}
      VERSUS_GRADUATION_MAX_EXECUTION_FEE_WEI: ${VERSUS_GRADUATION_MAX_EXECUTION_FEE_WEI:-5000000000000000}
      VERSUS_WAKU_REST_URL: http://nwaku:8645
      VERSUS_WAKU_CLUSTER_ID: ${VERSUS_WAKU_CLUSTER_ID:-66}
      VERSUS_WAKU_NUM_SHARDS: ${VERSUS_WAKU_NUM_SHARDS:-8}
      VERSUS_NODE_STATE_PATH: /data/state.json
      VERSUS_GRADUATION_STATE_PATH: /data/graduation-state.json
      VERSUS_HATCH_QUOTE_CACHE_PATH: /data/hatch-quote.json
      VERSUS_CLASS_STATE_CACHE_PATH: /data/class-state.json
      VERSUS_NODE_HEALTH_PORT: 8787
    volumes:
      - ${VERSUS_NODE_DATA_DIR:-./node-data}:/data
    ports:
      - 127.0.0.1:${VERSUS_NODE_HEALTH_PORT:-18787}:8787/tcp
    networks:
      - edge
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

networks:
  edge:
    driver: bridge
